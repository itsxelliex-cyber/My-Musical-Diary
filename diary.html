<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> My Musical Diary </title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bitcount+Grid+Double+Ink:wght@100..900&display=swap" rel="stylesheet">
</head>
<body>
    <body class="diary"> 
    <h2> In this journal, you can write the best, most amazing songs ever! </h2>
   </body>

       <button id="open-modal" type="button">Open Journal</button>
   <div class="modal-container" aria-hidden="true">
      <div class="modal" role="dialog" aria-modal="true">
        <textarea id="journal-text" rows="12" placeholder="Write your song ideas here..." style="width:100%; box-sizing:border-box;"></textarea>
        <div style="margin-top:12px;">
          <button id="save-journal" type="button">Save</button>
          <button id="close-modal" type="button">Close</button>
        </div>
      </div>
    </div>

   

    <script src="script.js"></script>
</body>
</html>
